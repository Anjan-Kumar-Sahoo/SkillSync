spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888
server.port=8080

# Specific routes only (Keeping these here until they are confirmed in central config)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[2].id=mentor-service
spring.cloud.gateway.routes[2].uri=lb://mentor-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/mentors/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[3].id=skill-service
spring.cloud.gateway.routes[3].uri=lb://skill-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/skills/**

spring.cloud.gateway.routes[4].id=session-service
spring.cloud.gateway.routes[4].uri=lb://session-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/sessions/**
spring.cloud.gateway.routes[4].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[5].id=group-service
spring.cloud.gateway.routes[5].uri=lb://group-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/groups/**
spring.cloud.gateway.routes[5].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[6].id=review-service
spring.cloud.gateway.routes[6].uri=lb://review-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/reviews/**
spring.cloud.gateway.routes[6].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[7].filters[0]=JwtAuthenticationFilter

logging.level.org.springframework.cloud.gateway=DEBUG
