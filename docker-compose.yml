# ============================================================
#  SkillSync - Docker Compose (Production-Ready)
#  Usage: docker-compose up --build
#  Config: All values from .env (never hardcode secrets here)
# ============================================================
#
#  Startup Order:
#    postgres/rabbitmq → eureka → config-server → microservices → gateway → nginx
#
#  Exposed Ports:
#    80    - NGINX (public entry point)
#    8080  - API Gateway (Swagger UI: http://localhost:8080/swagger-ui.html)
#    8761  - Eureka Dashboard (debug only)
#    15672 - RabbitMQ Management UI (debug only)
#
#  NOTE: Individual service ports are NOT exposed.
#        All traffic goes through the API Gateway.
# ============================================================

services:

  # ======================== INFRASTRUCTURE ====================

  postgres:
    image: postgres:16-alpine
    container_name: skillsync-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skillsync-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: skillsync-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - skillsync-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: skillsync-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== DISCOVERY & CONFIG ================

  eureka-server:
    build: ./eureka-server
    container_name: skillsync-eureka
    env_file: .env
    ports:
      - "8761:8761"   # Exposed for debug dashboard — remove in true production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skillsync-net
    restart: unless-stopped

  config-server:
    build: ./config-server
    container_name: skillsync-config
    env_file: .env
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== API GATEWAY =======================

  api-gateway:
    build: ./api-gateway
    container_name: skillsync-gateway
    env_file: .env
    ports:
      - "8080:8080"   # API Gateway — main entry point for Postman
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== MICROSERVICES =====================

  auth-service:
    build: ./auth-service
    container_name: skillsync-auth
    env_file: .env
    environment:
      DB_NAME: skillsync_auth
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  user-service:
    build: 
      context: .
      dockerfile: user-service/Dockerfile
    container_name: skillsync-user
    env_file: .env
    environment:
      DB_NAME: skillsync_user
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  skill-service:
    build: 
      context: .
      dockerfile: skill-service/Dockerfile
    container_name: skillsync-skill
    env_file: .env
    environment:
      DB_NAME: skillsync_skill
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  session-service:
    build: 
      context: .
      dockerfile: session-service/Dockerfile
    container_name: skillsync-session
    env_file: .env
    environment:
      DB_NAME: skillsync_session
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  # group-service: MERGED into user-service
  # mentor-service: MERGED into user-service

  # review-service: MERGED into session-service

  notification-service:
    build: 
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: skillsync-notification
    env_file: .env
    environment:
      DB_NAME: skillsync_notification
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== NGINX REVERSE PROXY ===============

  nginx:
    image: nginx:1.25-alpine
    container_name: skillsync-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - skillsync-net
    restart: unless-stopped

# ======================== VOLUMES & NETWORKS ==================

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  skillsync-net:
    driver: bridge
