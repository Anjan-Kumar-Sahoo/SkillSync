spring.application.name=user-service
server.port=${SERVER_PORT:8082}

# ============================================================
# Config Server (Spring Boot 3 modern approach - replaces bootstrap.properties)
# ============================================================
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=6000
spring.cloud.config.retry.multiplier=1.5

# ============================================================
# Database
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillsync_user}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.properties.hibernate.default_schema=users
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection pool resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.initialization-fail-timeout=-1

# ============================================================
# RabbitMQ (merged from mentor-service)
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ============================================================
# Eureka Client
# ============================================================
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

# ============================================================
# Actuator & Logging
# ============================================================
logging.file.name=logs/user-service.log
management.endpoints.web.exposure.include=health,info

# ============================================================
# Swagger / OpenAPI (springdoc)
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
springdoc.show-actuator=false

# ============================================================
# Razorpay Payment Gateway
# ============================================================
razorpay.api.key=${RAZORPAY_API_KEY:rzp_test_SUxK0KnvPwKuAT}
razorpay.api.secret=${RAZORPAY_API_SECRET:p0fqspCZHi7jVd24czBGwbf8}

