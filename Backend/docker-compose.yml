# ============================================================
#  SkillSync - Docker Compose (Production-Ready)
#  Usage: docker-compose up --build
#  Config: All values from .env (never hardcode secrets here)
# ============================================================
#
#  Startup Order:
#    postgres/rabbitmq → eureka → config-server → microservices → gateway → nginx
#
#  Exposed Ports:
#    80    - NGINX (public entry point)
#    8080  - API Gateway (Swagger UI: http://localhost:8080/swagger-ui.html)
#    8761  - Eureka Dashboard (debug only)
#    15672 - RabbitMQ Management UI (debug only)
#    9411  - Zipkin Tracing UI
#    9090  - Prometheus Metrics UI
#    3000  - Grafana Dashboards (admin/skillsync)
#    3100  - Loki Log Aggregation API
#
#  NOTE: Individual service ports are NOT exposed.
#        All traffic goes through the API Gateway.
# ============================================================

services:

  # ======================== INFRASTRUCTURE ====================

  postgres:
    image: postgres:16-alpine
    container_name: skillsync-postgres
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skillsync-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: skillsync-rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - skillsync-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: skillsync-redis
    deploy:
      resources:
        limits:
          memory: 256M
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skillsync-net
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: skillsync-zipkin
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "9411:9411"   # Zipkin UI (http://localhost:9411)
    environment:
      STORAGE_TYPE: mem
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== PROMETHEUS ========================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: skillsync-prometheus
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "9090:9090"   # Prometheus UI (http://localhost:9090)
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== GRAFANA ===========================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: skillsync-grafana
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "3000:3000"   # Grafana UI (http://localhost:3000)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: skillsync
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== LOKI (Log Aggregation) ============
  loki:
    image: grafana/loki:2.9.4
    container_name: skillsync-loki
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "3100:3100"   # Loki API
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== DISCOVERY & CONFIG ================

  eureka-server:
    image: ${DOCKERHUB_USERNAME}/eureka-server:latest
    container_name: skillsync-eureka
    deploy:
      resources:
        limits:
          memory: 384M
    env_file: .env
    ports:
      - "8761:8761"   # Exposed for debug dashboard — remove in true production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skillsync-net
    restart: unless-stopped

  config-server:
    image: ${DOCKERHUB_USERNAME}/config-server:latest
    container_name: skillsync-config
    deploy:
      resources:
        limits:
          memory: 384M
    env_file: .env
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== API GATEWAY =======================

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/api-gateway:latest
    container_name: skillsync-gateway
    deploy:
      resources:
        limits:
          memory: 384M
    env_file: .env
    ports:
      - "8080:8080"   # API Gateway — main entry point for Postman
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skillsync-net
    restart: unless-stopped

  # ======================== MICROSERVICES =====================

  auth-service:
    image: ${DOCKERHUB_USERNAME}/auth-service:latest
    container_name: skillsync-auth
    deploy:
      resources:
        limits:
          memory: 448M
    env_file: .env
    environment:
      DB_NAME: skillsync_auth
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  user-service:
    image: ${DOCKERHUB_USERNAME}/user-service:latest
    container_name: skillsync-user
    deploy:
      resources:
        limits:
          memory: 448M
    env_file: .env
    environment:
      DB_NAME: skillsync_user
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  skill-service:
    image: ${DOCKERHUB_USERNAME}/skill-service:latest
    container_name: skillsync-skill
    deploy:
      resources:
        limits:
          memory: 448M
    env_file: .env
    environment:
      DB_NAME: skillsync_skill
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  session-service:
    image: ${DOCKERHUB_USERNAME}/session-service:latest
    container_name: skillsync-session
    deploy:
      resources:
        limits:
          memory: 448M
    env_file: .env
    environment:
      DB_NAME: skillsync_session
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  # group-service: MERGED into user-service
  # mentor-service: MERGED into user-service

  # review-service: MERGED into session-service

  notification-service:
    image: ${DOCKERHUB_USERNAME}/notification-service:latest
    container_name: skillsync-notification
    deploy:
      resources:
        limits:
          memory: 448M
    env_file: .env
    environment:
      DB_NAME: skillsync_notification
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped

  payment-service:
    image: ${DOCKERHUB_USERNAME}/payment-service:latest
    container_name: skillsync-payment
    deploy:
      resources:
        limits:
          memory: 448M
    env_file: .env
    environment:
      DB_NAME: skillsync_payment
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillsync-net
    restart: unless-stopped


  # ======================== NGINX REVERSE PROXY ===============

  nginx:
    image: nginx:1.25-alpine
    container_name: skillsync-nginx
    deploy:
      resources:
        limits:
          memory: 64M
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - skillsync-net
    restart: unless-stopped

# ======================== VOLUMES & NETWORKS ==================

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  skillsync-net:
    driver: bridge
