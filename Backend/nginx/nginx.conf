# ============================================================
#  SkillSync - NGINX Reverse Proxy Configuration
#  Primary entry point: port 80
#  Routes all traffic to internal Docker services via DNS
# ============================================================

upstream api_gateway {
    server skillsync-gateway:8080;
}

server {
    listen 80;
    server_name _;  # Accept any hostname (EC2 public IP, domain, or localhost)

    # ======================== TIMEOUTS ========================
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      90s;
    send_timeout            60s;

    # ======================== COMMON HEADERS ==================
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ======================== HEALTH CHECK =====================
    # Lightweight endpoint for NGINX container healthcheck
    # Returns 200 without proxying — proves NGINX itself is alive
    location = /nginx-health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # ======================== API ROUTES ======================
    # All /api/** requests → API Gateway
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    # ======================== EUREKA DASHBOARD =================
    # Proxies Eureka UI — accessible at http://<EC2-IP>/eureka-ui/
    location /eureka-ui/ {
        proxy_pass http://eureka-server:8761/;
        proxy_set_header Host $host;
    }

    # ======================== SWAGGER UI ======================
    # Forward Swagger UI and API docs to gateway
    location /swagger-ui/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    location /swagger-ui.html {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    location /service-docs/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    location /webjars/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    # ======================== WEBSOCKET =======================
    # WebSocket support for notification service (via gateway)
    location /ws/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout          86400s;
    }

    # ======================== ACTUATOR ========================
    # Gateway health check endpoint (used by monitoring)
    location /actuator/ {
        proxy_pass http://api_gateway;
    }

    # ======================== ROOT (Catch-All) =================
    # Everything else → Gateway
    location / {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    # ======================== ERROR PAGES =====================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
