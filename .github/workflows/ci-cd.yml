# ============================================================
#  SkillSync CI/CD Pipeline (Production-Grade)
#  - Build shared library first (skillsync-cache-common)
#  - Build & test all services in parallel
#  - Code quality analysis (SonarQube)
#  - Docker build with semantic versioning
#  - Compose validation
# ============================================================
name: SkillSync CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  DOCKER_REGISTRY: docker.io

jobs:

  # ======================== BUILD SHARED LIBRARY ===============
  build-cache-common:
    name: Build Cache Common Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Install skillsync-cache-common
        working-directory: ./Backend/skillsync-cache-common
        run: mvn clean install -DskipTests -B

      - name: Upload cache-common artifact
        uses: actions/upload-artifact@v4
        with:
          name: cache-common-jar
          path: ~/.m2/repository/com/skillsync/skillsync-cache-common/
          retention-days: 1

  # ======================== BUILD & TEST ALL SERVICES ==========
  build-and-test:
    name: Build & Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-cache-common
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - auth-service
          - user-service
          - skill-service
          - session-service
          - notification-service
          - payment-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Download cache-common
        uses: actions/download-artifact@v4
        with:
          name: cache-common-jar
          path: ~/.m2/repository/com/skillsync/skillsync-cache-common/

      - name: Build ${{ matrix.service }}
        working-directory: ./Backend/${{ matrix.service }}
        run: mvn clean package -DskipTests -B

      - name: Run Unit Tests - ${{ matrix.service }}
        working-directory: ./Backend/${{ matrix.service }}
        run: mvn test -B
        # FAIL pipeline on test failure (no continue-on-error)

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: ./Backend/${{ matrix.service }}/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ./Backend/${{ matrix.service }}/target/*.jar
          retention-days: 1


  # ======================== BUILD DOCKER IMAGES ===============
  docker:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            tag: eureka
            context: ./Backend/eureka-server
            dockerfile: ./Backend/eureka-server/Dockerfile
          - service: config-server
            tag: config
            context: ./Backend/config-server
            dockerfile: ./Backend/config-server/Dockerfile
          - service: api-gateway
            tag: gateway
            context: ./Backend/api-gateway
            dockerfile: ./Backend/api-gateway/Dockerfile
          - service: auth-service
            tag: auth
            context: ./Backend
            dockerfile: ./Backend/auth-service/Dockerfile
          - service: user-service
            tag: user
            context: ./Backend
            dockerfile: ./Backend/user-service/Dockerfile
          - service: skill-service
            tag: skill
            context: ./Backend
            dockerfile: ./Backend/skill-service/Dockerfile
          - service: session-service
            tag: session
            context: ./Backend
            dockerfile: ./Backend/session-service/Dockerfile
          - service: notification-service
            tag: notification
            context: ./Backend
            dockerfile: ./Backend/notification-service/Dockerfile
          - service: payment-service
            tag: payment
            context: ./Backend
            dockerfile: ./Backend/payment-service/Dockerfile
          - service: frontend
            tag: frontend
            context: ./Frontend
            dockerfile: ./Frontend/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillsync:${{ matrix.tag }}-latest
            ${{ secrets.DOCKER_USERNAME }}/skillsync:${{ matrix.tag }}-${{ github.sha }}
          build-args: |
            ${{ matrix.build_args }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ======================== COMPOSE VALIDATION ================
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        working-directory: ./Backend
        run: docker compose config --quiet

  # ======================== CODE QUALITY (SonarCloud) ===========
  code-quality:
    name: Code Quality - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - skill-service
          - session-service
          - notification-service
          - payment-service
          - api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Download cache-common
        uses: actions/download-artifact@v4
        with:
          name: cache-common-jar
          path: ~/.m2/repository/com/skillsync/skillsync-cache-common/

      - name: SonarCloud Scan - ${{ matrix.service }}
        working-directory: ./Backend/${{ matrix.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=SkillSync_${{ matrix.service }} \
            -Dsonar.organization=skillsync-github \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  # ======================== DEPLOY TO EC2 =====================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker, validate-compose, code-quality]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose and nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "Backend/docker-compose.yml,Backend/nginx/nginx.conf,Backend/.env.example,Backend/init-databases.sql,Backend/monitoring/**"
          target: "~/SkillSync"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/SkillSync/Backend
            # Pull latest code from GitHub
            git pull origin main
            # Create .env if it doesn't exist (using defaults from example)
            if [ ! -f .env ]; then cp .env.example .env; fi
            # Pull latest Docker images from Hub
            docker compose pull
            # Start/Restart services with new images
            docker compose up -d --remove-orphans
            # Cleanup unused dangling images to save disk space
            docker image prune -f
