# ═══════════════════════════════════════════════════════════════
#  SonarCloud — SkillSync Multi-Module Configuration
#  Covers both Backend (Java/Spring Boot) and Frontend (React/TS)
#  CI-based analysis only (automatic analysis OFF)
# ═══════════════════════════════════════════════════════════════

sonar.projectKey=Anjan-Kumar-Sahoo_SkillSync
sonar.organization=anjan-kumar-sahoo
sonar.projectName=SkillSync

# ── Encoding ──
sonar.sourceEncoding=UTF-8

# ── Source paths (Backend + Frontend) ──
# IMPORTANT: These must match the actual directory casing on disk.
# The git repo uses "Backend" and "Frontend" (capital B/F).
# Linux CI is case-sensitive, so we MUST use the exact casing.
sonar.sources=Backend,Frontend/src

# ── Source file inclusions ──
sonar.inclusions=\
  Backend/**/*.java,\
  Frontend/src/**/*.ts,\
  Frontend/src/**/*.tsx

# ── Test paths ──
sonar.tests=Backend,Frontend/src

# ── Test file detection ──
sonar.test.inclusions=\
  **/*Test.java,\
  **/*Tests.java,\
  **/*.test.ts,\
  **/*.test.tsx

# ── Java settings ──
sonar.java.binaries=Backend/**/target/classes
sonar.java.test.binaries=Backend/**/target/test-classes

# Java libraries for SonarCloud (fixes unresolved types)
sonar.java.libraries=Backend/**/target/dependency/*.jar

# ── JaCoCo coverage reports (XML) — per-module, merged by SonarCloud ──
# CRITICAL: Do NOT use the aggregate report (Backend/target/site/jacoco-aggregate/jacoco.xml).
# The Maven report-aggregate goal produces INCOMPLETE data because child modules
# use spring-boot-starter-parent (not the aggregator POM) as their Maven parent.
# Verified: aggregate shows AuthService at 25% vs per-module at 98%.
# SonarCloud correctly merges per-module reports when listed explicitly.
sonar.coverage.jacoco.xmlReportPaths=\
  Backend/auth-service/target/site/jacoco/jacoco.xml,\
  Backend/user-service/target/site/jacoco/jacoco.xml,\
  Backend/skill-service/target/site/jacoco/jacoco.xml,\
  Backend/session-service/target/site/jacoco/jacoco.xml,\
  Backend/notification-service/target/site/jacoco/jacoco.xml,\
  Backend/payment-service/target/site/jacoco/jacoco.xml,\
  Backend/api-gateway/target/site/jacoco/jacoco.xml,\
  Backend/config-server/target/site/jacoco/jacoco.xml,\
  Backend/eureka-server/target/site/jacoco/jacoco.xml,\
  Backend/skillsync-cache-common/target/site/jacoco/jacoco.xml

# ── Frontend LCOV coverage report (Jest) ──
# Jest generates LCOV with paths relative to Frontend/ (e.g., SF:src/components/...)
# SonarCloud resolves these against the source path "Frontend/src", so this works correctly.
sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=Frontend/coverage/lcov.info

# ── Exclusions (analysis scope — files Sonar should NOT analyze at all) ──
sonar.exclusions=\
  **/node_modules/**,\
  **/target/**,\
  **/build/**,\
  **/dist/**,\
  Frontend/coverage/**,\
  Frontend/tests/**

# ── Coverage exclusions ──
# 🔥 CRITICAL: These must align with Jest's collectCoverageFrom in jest.config.cjs.
# Jest only collects coverage from: App.tsx, components/**, context/**, hooks/**,
# routes/**, services/**, store/**, utils/**
# Files NOT in that list (pages/**, features/**, main.tsx, types/**, assets/**)
# would show 0% in Sonar, dragging down the overall score.
# We exclude them from coverage measurement so Sonar only measures what Jest covers.
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*Test.java,\
  **/*Tests.java,\
  **/dto/**,\
  **/entity/**,\
  **/enums/**,\
  **/mapper/**,\
  **/repository/**,\
  **/*Exception.java,\
  **/config/**,\
  **/*Application.java,\
  **/*Config.java,\
  **/eureka/**,\
  **/discovery/**,\
  **/gateway/config/**,\
  **/websocket/config/**,\
  **/*Properties.java,\
  **/*Constants.java,\
  Frontend/src/main.tsx,\
  Frontend/src/vite-env.d.ts,\
  Frontend/src/index.tsx,\
  Frontend/src/types/**,\
  Frontend/src/pages/**,\
  Frontend/src/features/**,\
  Frontend/src/assets/**,\
  Frontend/src/index.css,\
  Frontend/src/App.css,\
  Frontend/src/constants/**,\
  Frontend/src/routes/**,\
  Frontend/src/store/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.config.cjs

# ── Quality Gate ──
# BLOCKING: wait for quality gate result and fail CI if not passed
sonar.qualitygate.wait=true
