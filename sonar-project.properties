# ═══════════════════════════════════════════════════════════════
#  SonarCloud — SkillSync Multi-Module Configuration
# ═══════════════════════════════════════════════════════════════

sonar.projectKey=Anjan-Kumar-Sahoo_SkillSync
sonar.organization=anjan-kumar-sahoo
sonar.projectName=SkillSync

# ── Source paths ──
sonar.sources=Backend/auth-service/src/main/java,\
  Backend/user-service/src/main/java,\
  Backend/skill-service/src/main/java,\
  Backend/session-service/src/main/java,\
  Backend/notification-service/src/main/java,\
  Backend/payment-service/src/main/java,\
  Backend/skillsync-cache-common/src/main/java,\
  Backend/config-server/src/main/java,\
  Backend/eureka-server/src/main/java,\
  Backend/api-gateway/src/main/java,\
  Frontend/src

# ── Test paths ──
sonar.tests=Backend/auth-service/src/test/java,\
  Backend/user-service/src/test/java,\
  Backend/skill-service/src/test/java,\
  Backend/session-service/src/test/java,\
  Backend/notification-service/src/test/java,\
  Backend/payment-service/src/test/java,\
  Backend/skillsync-cache-common/src/test/java,\
  Backend/config-server/src/test/java,\
  Backend/eureka-server/src/test/java,\
  Backend/api-gateway/src/test/java,\
  Frontend/tests

# ── Java settings ──
sonar.java.binaries=Backend/*/target/classes
sonar.java.test.binaries=Backend/*/target/test-classes
sonar.sourceEncoding=UTF-8

# ── JaCoCo coverage reports (XML) ──
sonar.coverage.jacoco.xmlReportPaths=\
  Backend/auth-service/target/site/jacoco/jacoco.xml,\
  Backend/user-service/target/site/jacoco/jacoco.xml,\
  Backend/skill-service/target/site/jacoco/jacoco.xml,\
  Backend/session-service/target/site/jacoco/jacoco.xml,\
  Backend/notification-service/target/site/jacoco/jacoco.xml,\
  Backend/payment-service/target/site/jacoco/jacoco.xml,\
  Backend/skillsync-cache-common/target/site/jacoco/jacoco.xml,\
  Backend/config-server/target/site/jacoco/jacoco.xml,\
  Backend/eureka-server/target/site/jacoco/jacoco.xml,\
  Backend/api-gateway/target/site/jacoco/jacoco.xml

# ── Frontend LCOV coverage report ──
sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=Frontend/coverage/lcov.info

# ── Exclusions ──
sonar.exclusions=\
  **/node_modules/**,\
  **/target/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/setupTests.ts,\
  **/jest.config.*,\
  **/vite.config.*

sonar.coverage.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/enums/**,\
  **/config/**,\
  **/*Application.java,\
  **/*Exception.java

# ── Test file patterns ──
sonar.test.inclusions=\
  **/*Test.java,\
  **/*Tests.java,\
  **/*.test.ts,\
  **/*.test.tsx

# ── Quality Gate ──
sonar.qualitygate.wait=true
